# nginx interne : sert le SPA Vite. Le routage /api et /health vers l'API
# est assuré par l'OpenResty frontal (vhost urban.daenivaux.fr), pas ici.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache long pour les assets fingerprintés de Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA : toute route inconnue retombe sur index.html (React Router côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
