# AISCA Medical
#   /        → frontend React (nginx statique)  127.0.0.1:8013
#   /api/... → API FastAPI 127.0.0.1:8003  (le préfixe /api est retiré :
#              les endpoints sont /analyze, /plan, /report... à la racine)

server {
    listen 80;
    server_name aisca.daenivaux.fr;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name aisca.daenivaux.fr;

    ssl_certificate     /etc/letsencrypt/live/daenivaux.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daenivaux.fr/privkey.pem;

    auth_basic           "Soutenance";
    auth_basic_user_file /etc/openresty/htpasswd_soutenance;

    client_max_body_size 25m;   # upload de CV PDF

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # génération Gemini parfois longue
    }

    location / {
        proxy_pass http://127.0.0.1:8013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
