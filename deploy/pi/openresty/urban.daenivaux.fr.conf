# Urban Data Explorer
#   /            → frontend (nginx statique)  127.0.0.1:8011
#   /api, /health → API FastAPI               127.0.0.1:8001

server {
    listen 80;
    server_name urban.daenivaux.fr;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name urban.daenivaux.fr;

    ssl_certificate     /etc/letsencrypt/live/daenivaux.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daenivaux.fr/privkey.pem;

    auth_basic           "Soutenance";
    auth_basic_user_file /etc/openresty/htpasswd_soutenance;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
