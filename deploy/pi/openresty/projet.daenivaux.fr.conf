# Portail : page d'accueil avec les 3 vignettes.
# Servie en statique depuis /var/www/projet  (déposé par deploy.sh).
#
# IMPORTANT : adapter ssl_certificate / auth_basic_user_file à votre Pi.
#   - Cert wildcard *.daenivaux.fr  → /etc/letsencrypt/live/daenivaux.fr/
#   - Sinon cert par sous-domaine   → /etc/letsencrypt/live/projet.daenivaux.fr/

server {
    listen 80;
    server_name projet.daenivaux.fr;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name projet.daenivaux.fr;

    ssl_certificate     /etc/letsencrypt/live/daenivaux.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daenivaux.fr/privkey.pem;

    auth_basic           "Soutenance";
    auth_basic_user_file /etc/openresty/htpasswd_soutenance;

    root  /var/www/projet;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}
