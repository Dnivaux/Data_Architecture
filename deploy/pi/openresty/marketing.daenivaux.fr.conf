# Data Science Marketing — dashboard Streamlit (127.0.0.1:8012).
# Streamlit nécessite le passage des WebSockets (Upgrade/Connection).

server {
    listen 80;
    server_name marketing.daenivaux.fr;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name marketing.daenivaux.fr;

    ssl_certificate     /etc/letsencrypt/live/daenivaux.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daenivaux.fr/privkey.pem;

    auth_basic           "Soutenance";
    auth_basic_user_file /etc/openresty/htpasswd_soutenance;

    location / {
        proxy_pass http://127.0.0.1:8012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # WebSocket Streamlit longue durée
    }
}
