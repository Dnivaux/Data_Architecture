# nginx interne : sert le SPA React d'aisca. Le routage /api est géré par
# l'OpenResty frontal (vhost aisca.daenivaux.fr), pas ici.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
