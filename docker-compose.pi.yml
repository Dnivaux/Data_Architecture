# ============================================================
# Urban Data Explorer — stack de PRODUCTION pour le Raspberry Pi.
#   • Ports bindés sur 127.0.0.1 uniquement → exposés via OpenResty (urban.daenivaux.fr)
#   • Postgres/Mongo NON publiés (réseau docker interne)
#   • Airflow sous profile "airflow" → éteint par défaut, démarré à la demande
#
# Lancement :   docker compose --env-file ~/apps/.env -f docker-compose.pi.yml up -d --build
# Airflow démo : docker compose --env-file ~/apps/.env -f docker-compose.pi.yml --profile airflow up -d
# ============================================================
services:

  postgres:
    image: kartoza/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: urbandata
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urbandata"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/urbandata
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: urbandata
      APP_ENV: production
      API_KEYS: ${URBAN_API_KEYS:-changeme-set-in-env}
      RATE_LIMIT: ${URBAN_RATE_LIMIT:-120/minute}
      ALLOWED_ORIGINS: https://urban.daenivaux.fr
      ALLOWED_HOSTS: urban.daenivaux.fr,127.0.0.1,localhost
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URLs relatives → OpenResty route /api et /health vers le service api
        VITE_API_URL: ""
        VITE_API_KEY: ${URBAN_API_KEYS:-changeme-set-in-env}
    ports:
      - "127.0.0.1:8011:80"
    depends_on:
      - api
    restart: unless-stopped

  # ---------- Airflow (profile "airflow" : démarré à la demande) ----------
  airflow-postgres:
    image: postgres:16
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    profiles: ["airflow"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/urbandata
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: urbandata
      PYTHONPATH: /opt/airflow/project
    volumes: &airflow-volumes
      - ./dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
      - .:/opt/airflow/project
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username airflow --password airflow \
          --firstname Urban --lastname Data --role Admin \
          --email admin@example.com || true

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    command: scheduler
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "127.0.0.1:8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  airflow_pg_data:
